version: "3.9"
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://user01:dkagh12%23@host.docker.internal:3306/llmwiki
    volumes:
      - ./storage:/app/storage
      - ./wiki_repo:/app/wiki_repo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev -- --host
